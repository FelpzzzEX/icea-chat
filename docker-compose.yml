services:
  db:
    image: postgres:15
    container_name: chatDB
    restart: always
    ports:
      - 5433:5432
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: iceachat
    volumes:
      - iceachat_data:/var/lib/postgresql/data

volumes:
  iceachat_data: